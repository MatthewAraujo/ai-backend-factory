services:
  postgres:
    image: postgres:16-alpine
    container_name: ai-backend-factory-postgres
    environment:
      POSTGRES_DB: ai_backend_factory
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: ai-backend-factory-redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:

